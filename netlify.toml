[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env.production]
  [env.production.context.production.environment]
    VITE_API_URL = "https://team-error-1.onrender.com"
    VITE_SOCKET_URL = "https://team-error-1.onrender.com"
